name: Update GitHub Stats

on:
  schedule:
    - cron: '0 0 * * *'   # 每天 UTC 0 点自动运行
  workflow_dispatch:        # 允许手动触发

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create assets directory
        run: mkdir -p assets

      - name: Download GitHub Stats SVG
        run: |
          curl -s "https://github-readme-stats.vercel.app/api?username=Joker-0111-G&show_icons=true&theme=tokyonight&hide_border=true&bg_color=0d1117" > assets/stats.svg

      - name: Download Top Languages SVG
        run: |
          curl -s "https://github-readme-stats.vercel.app/api/top-langs/?username=Joker-0111-G&layout=compact&theme=tokyonight&hide_border=true&bg_color=0d1117" > assets/top-langs.svg

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add assets/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update GitHub stats SVGs"
            git push
          fi
